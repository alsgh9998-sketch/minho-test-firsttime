<body>
    <div class="container">
        <div id="start-screen" class="screen active">
            <h1>연애 MBTI 성격 유형 검사</h1>
            <p>연인 관계에서 당신은 어떤 사람일까요?</p>
            <button id="start-btn">검사 시작</button>
        </div>
        <div id="question-screen" class="screen">
            <h2 id="question"></h2>
            <div class="progress-bar">
                <div class="progress"></div>
            </div>
            <div id="answers"></div>
            <button id="prev-btn">되돌리기</button>
        </div>
        <div id="result-screen" class="screen">
            <div class="result-container">
                <div class="result-text">
                    <h2>당신의 연애 성격 유형은:</h2>
                    <h1 id="result"></h1>
                    <p id="result-description"></p>
                    <div id="good-match"></div>
                    <div id="bad-match"></div>
                </div>
                <div class="result-chart">
                    <h2>산출 근거</h2>
                    <canvas id="score-chart"></canvas>
                    <div id="score-values"></div>
                </div>
            </div>
        </div>
    </div>
